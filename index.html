<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoxMate - Smart Equipment Guide</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="equipment-guide">
        <div class="header">
            <h1>BoxMate</h1>
            <p>Intelligent Equipment Selection System</p>
        </div>

        <div class="select-container">
            <select id="equipment-type">
                <option value="">--- Select Equipment Type ---</option>
            </select>
        </div>

        <div id="content-container">
            <div id="equipment-details">
                <div class="detail-group">
                    <label>Addressable:</label>
                    <input type="text" id="addressable" readonly>
                </div>
                
                <div class="detail-group">
                    <label>Format:</label>
                    <input type="text" id="format" readonly>
                </div>

                <div class="detail-group">
                    <label>Status:</label>
                    <input type="text" id="status" readonly>
                </div>

                <div class="detail-group">
                    <label>Equipment Type:</label>
                    <input type="text" id="equip-type" readonly>
                </div>

                <div class="detail-group">
                    <label>Manufacturer:</label>
                    <input type="text" id="manufacturer" readonly>
                </div>

                <div class="detail-group">
                    <label>Location:</label>
                    <input type="text" id="location" readonly>
                </div>
                <div class="checkbox-div">
                    <div class="checkbox-container">
                        <input type="checkbox" id="events">
                        <div class="custom-checkbox"></div>
                        <label for="events">Events</label>
                    </div>

                    <div class="checkbox-container">
                        <input type="checkbox" id="nvod">
                        <div class="custom-checkbox"></div>
                        <label for="nvod">Nvod</label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
